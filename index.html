<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Tags Checker — Preview & Debug Your SEO Tags</title>
<meta name="description" content="Free tool to check and preview your meta tags. See how your page looks on Google, Twitter, Facebook, and LinkedIn.">
<style>
:root{--bg:#0a0a0f;--surface:#14141f;--surface2:#1e1e2e;--border:#2a2a3e;--text:#e0e0f0;--muted:#8888aa;--accent:#f59e0b;--accent2:#fbbf24;--green:#22c55e;--yellow:#eab308;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
header{text-align:center;margin-bottom:2.5rem}
h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2),#fde68a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
header p{color:var(--muted);font-size:1.05rem}
.input-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
label{display:block;font-weight:600;margin-bottom:.5rem;font-size:.9rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
textarea{width:100%;min-height:200px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1rem;color:var(--text);font-size:.85rem;font-family:'SF Mono',Monaco,Consolas,monospace;line-height:1.5;resize:vertical;outline:none;tab-size:2;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,var(--accent),#d97706);color:white;border:none;border-radius:10px;padding:.85rem 2rem;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;width:100%;justify-content:center;margin-top:.5rem}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,158,11,.3)}
.btn:active{transform:translateY(0)}
.results{display:none;margin-top:2rem}
.results.visible{display:block}
.section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
.section h3{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.preview-card{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:1rem}
.google-preview{background:var(--surface2);padding:1.25rem}
.gp-url{color:#8ab4f8;font-size:.8rem;margin-bottom:4px;font-family:Arial,sans-serif}
.gp-title{color:#8ab4f8;font-size:1.15rem;font-family:Arial,sans-serif;margin-bottom:4px;cursor:pointer}
.gp-title:hover{text-decoration:underline}
.gp-desc{color:#bdc1c6;font-size:.85rem;font-family:Arial,sans-serif;line-height:1.5}
.social-preview{background:var(--surface2);border-radius:10px;overflow:hidden;max-width:500px}
.sp-image{background:#1a1a2e;height:260px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.9rem;border-bottom:1px solid var(--border)}
.sp-body{padding:1rem}
.sp-domain{color:var(--muted);font-size:.75rem;text-transform:uppercase;margin-bottom:4px}
.sp-title{font-weight:600;font-size:.95rem;margin-bottom:4px;line-height:1.3}
.sp-desc{color:var(--muted);font-size:.85rem;line-height:1.4}
.tag-list{display:flex;flex-direction:column;gap:.5rem}
.tag-row{display:flex;gap:.75rem;padding:.6rem .75rem;background:var(--surface2);border-radius:8px;align-items:flex-start;font-size:.85rem}
.tag-key{color:var(--accent2);font-weight:600;min-width:180px;flex-shrink:0;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.8rem}
.tag-val{color:var(--text);word-break:break-all}
.tag-missing{color:var(--red);font-style:italic}
.issues-list{display:flex;flex-direction:column;gap:.5rem}
.issue{display:flex;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border);align-items:flex-start}
.issue:last-child{border-bottom:none}
.issue-icon{flex-shrink:0;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;margin-top:2px}
.i-error{background:#ef444430;color:var(--red)}
.i-warn{background:#eab30830;color:var(--yellow)}
.i-ok{background:#22c55e30;color:var(--green)}
.issue-text{font-size:.9rem;line-height:1.5}
.score-bar{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
.score-num{font-size:2rem;font-weight:800}
.score-meter{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width .6s}
.score-label{font-size:.9rem;color:var(--muted)}
.tab-bar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:.5rem 1rem;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.85rem;font-weight:500;transition:all .15s}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
@media(max-width:600px){h1{font-size:1.6rem}.tag-key{min-width:120px}}
.ad-slot{max-width:900px;margin:1.5rem auto;padding:0 1.5rem}
.ad-slot>div{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center;min-height:90px;display:flex;align-items:center;justify-content:center}
footer{text-align:center;padding:2rem 0;color:var(--muted);font-size:.8rem}
footer a{color:var(--accent2);text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Meta Tags Checker</h1>
    <p>Paste your HTML &lt;head&gt;. Preview Google, Twitter & Facebook cards. Find SEO issues.</p>
  </header>
  <div class="input-section">
    <label>Paste your HTML &lt;head&gt; section</label>
    <textarea id="htmlInput" placeholder='<title>My Page Title</title>
<meta name="description" content="A great page about...">
<meta property="og:title" content="My Page Title">
<meta property="og:description" content="A great page about...">
<meta property="og:image" content="https://example.com/image.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="https://example.com/page">'></textarea>
    <button class="btn" onclick="check()">🔍 Check Meta Tags</button>
  </div>
  <div class="results" id="results">
    <div class="section" id="scoreSection"></div>
    <div class="section" id="previewSection"></div>
    <div class="section" id="tagsSection"></div>
    <div class="section" id="issuesSection"></div>
  </div>
</div>
<div class="ad-slot">
  <div>
    <script async type="text/javascript" src="//cdn.carbonads.com/carbon.js?serve=CWYDP27Y&placement=michael-ami-01githubio" id="_carbonads_js"></script>
    <noscript><span style="color:var(--muted);font-size:.85rem">Ad slot — <a href="mailto:michael_ami_01@yahoo.com" style="color:var(--accent2)">sponsor this tool</a></span></noscript>
  </div>
</div>
<footer>
  Built by <a href="https://github.com/mzio" target="_blank">Michael Zhang</a> ·
  <a href="https://michael-ami-01.github.io/cold-email-scorer">Cold Email Scorer</a> ·
  <a href="https://michael-ami-01.github.io/readme-grader">README Grader</a>
</footer>
<script>
function parse(html){
  const d=new DOMParser().parseFromString('<head>'+html+'</head>','text/html');
  const get=(sel,attr)=>{const e=d.querySelector(sel);return e?(attr?e.getAttribute(attr):e.textContent):null};
  const getMeta=(name)=>get(`meta[name="${name}"]`,'content')||get(`meta[property="${name}"]`,'content');
  return {
    title:get('title'),
    description:getMeta('description'),
    canonical:get('link[rel="canonical"]','href'),
    robots:getMeta('robots'),
    ogTitle:getMeta('og:title'),
    ogDesc:getMeta('og:description'),
    ogImage:getMeta('og:image'),
    ogType:getMeta('og:type'),
    ogUrl:getMeta('og:url'),
    ogSiteName:getMeta('og:site_name'),
    twCard:getMeta('twitter:card'),
    twTitle:getMeta('twitter:title'),
    twDesc:getMeta('twitter:description'),
    twImage:getMeta('twitter:image'),
    twSite:getMeta('twitter:site'),
    viewport:getMeta('viewport'),
    charset:get('meta[charset]','charset'),
    author:getMeta('author'),
    keywords:getMeta('keywords'),
    themeColor:getMeta('theme-color'),
    favicon:get('link[rel="icon"]','href')||get('link[rel="shortcut icon"]','href'),
  };
}
function check(){
  const html=document.getElementById('htmlInput').value.trim();
  if(!html){alert('Paste HTML head content.');return}
  const t=parse(html);
  const issues=[];
  let score=0;const max=20;

  // Scoring + issues
  if(t.title){score+=3;if(t.title.length>60)issues.push({type:'warn',msg:`Title is ${t.title.length} chars — Google truncates after ~60.`});else if(t.title.length<10)issues.push({type:'warn',msg:'Title is very short. Aim for 30-60 characters.'});} 
  else{issues.push({type:'error',msg:'Missing <title> tag — critical for SEO and browser tabs.'});}
  if(t.description){score+=3;if(t.description.length>160)issues.push({type:'warn',msg:`Description is ${t.description.length} chars — Google truncates after ~160.`});else if(t.description.length<50)issues.push({type:'warn',msg:'Description is short. Aim for 120-160 characters.'});} 
  else{issues.push({type:'error',msg:'Missing meta description — this is what shows in Google results.'});}
  if(t.ogTitle)score+=2;else issues.push({type:'warn',msg:'Missing og:title — Facebook/LinkedIn will fall back to <title>.'});
  if(t.ogDesc)score+=2;else issues.push({type:'warn',msg:'Missing og:description — social shares won\'t have a preview description.'});
  if(t.ogImage){score+=3;} else{issues.push({type:'error',msg:'Missing og:image — social shares will have no preview image. This dramatically reduces clicks.'});}
  if(t.twCard)score+=2;else issues.push({type:'warn',msg:'Missing twitter:card — Twitter won\'t show a rich preview.'});
  if(t.canonical)score+=2;else issues.push({type:'warn',msg:'No canonical URL — helps prevent duplicate content issues.'});
  if(t.viewport)score+=1;else issues.push({type:'warn',msg:'No viewport meta — page may not be mobile-friendly.'});
  if(t.charset)score+=1;else issues.push({type:'warn',msg:'No charset declared — should be UTF-8.'});
  if(t.favicon)score+=1;else issues.push({type:'warn',msg:'No favicon link — browsers show a generic icon.'});
  if(t.keywords)issues.push({type:'warn',msg:'meta keywords is present — Google ignores it. Consider removing.'});
  if(issues.length===0)issues.push({type:'ok',msg:'All essential meta tags look good!'});

  const pct=Math.round(score/max*100);
  render(t,issues,pct);
}
function c(p){return p>=80?'var(--green)':p>=50?'var(--yellow)':'var(--red)'}
function esc(s){return s?s.replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function render(t,issues,pct){
  document.getElementById('results').classList.add('visible');
  const sc=c(pct);

  // Score
  document.getElementById('scoreSection').innerHTML=`<h3>📊 SEO Score</h3>
    <div class="score-bar"><div class="score-num" style="color:${sc}">${pct}%</div>
    <div><div class="score-meter"><div class="score-fill" style="width:${pct}%;background:${sc}"></div></div>
    <div class="score-label">${pct>=80?'Strong meta tags':pct>=50?'Room for improvement':'Needs significant work'}</div></div></div>`;

  // Previews
  const url=t.canonical||t.ogUrl||'example.com/page';
  const domain=url.replace(/^https?:\/\//,'').split('/')[0];
  document.getElementById('previewSection').innerHTML=`<h3>👁 Previews</h3>
    <div class="tab-bar"><div class="tab active" onclick="showTab(this,'google')">Google</div><div class="tab" onclick="showTab(this,'facebook')">Facebook</div><div class="tab" onclick="showTab(this,'twitter')">Twitter</div></div>
    <div id="tab-google" class="preview-card"><div class="google-preview">
      <div class="gp-url">${esc(domain)} › ...</div>
      <div class="gp-title">${esc(t.title||'No title set')}</div>
      <div class="gp-desc">${esc(t.description||'No description set')}</div>
    </div></div>
    <div id="tab-facebook" class="preview-card" style="display:none"><div class="social-preview">
      <div class="sp-image">${t.ogImage?'<img src="'+esc(t.ogImage)+'" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML=\'Image URL set but cannot load\'">':'No og:image set'}</div>
      <div class="sp-body"><div class="sp-domain">${esc(domain)}</div><div class="sp-title">${esc(t.ogTitle||t.title||'No title')}</div><div class="sp-desc">${esc(t.ogDesc||t.description||'No description')}</div></div>
    </div></div>
    <div id="tab-twitter" class="preview-card" style="display:none"><div class="social-preview">
      <div class="sp-image">${t.twImage||t.ogImage?'<img src="'+esc(t.twImage||t.ogImage)+'" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML=\'Image URL set but cannot load\'">':'No twitter:image or og:image set'}</div>
      <div class="sp-body"><div class="sp-domain">${esc(domain)}${t.twSite?' · '+esc(t.twSite):''}</div><div class="sp-title">${esc(t.twTitle||t.ogTitle||t.title||'No title')}</div><div class="sp-desc">${esc(t.twDesc||t.ogDesc||t.description||'No description')}</div></div>
    </div></div>`;

  // Tags found
  const tags=[
    ['title',t.title],['description',t.description],['canonical',t.canonical],['robots',t.robots],
    ['og:title',t.ogTitle],['og:description',t.ogDesc],['og:image',t.ogImage],['og:type',t.ogType],['og:url',t.ogUrl],['og:site_name',t.ogSiteName],
    ['twitter:card',t.twCard],['twitter:title',t.twTitle],['twitter:description',t.twDesc],['twitter:image',t.twImage],['twitter:site',t.twSite],
    ['viewport',t.viewport],['charset',t.charset],['author',t.author],['theme-color',t.themeColor],['favicon',t.favicon]
  ];
  document.getElementById('tagsSection').innerHTML=`<h3>🏷 Tags Found</h3><div class="tag-list">${tags.map(([k,v])=>
    `<div class="tag-row"><span class="tag-key">${k}</span><span class="${v?'tag-val':'tag-missing'}">${v?esc(v):'not set'}</span></div>`
  ).join('')}</div>`;

  // Issues
  document.getElementById('issuesSection').innerHTML=`<h3>🔎 Issues & Suggestions</h3><div class="issues-list">${issues.map(i=>
    `<div class="issue"><div class="issue-icon i-${i.type}">${i.type==='error'?'✗':i.type==='warn'?'!':'✓'}</div><div class="issue-text">${i.msg}</div></div>`
  ).join('')}</div>`;

  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}
function showTab(el,name){
  el.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['google','facebook','twitter'].forEach(n=>{
    document.getElementById('tab-'+n).style.display=n===name?'block':'none';
  });
}
</script>
</body>
</html>
